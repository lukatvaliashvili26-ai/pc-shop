{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="text-white">PC shop</h2>

    {% if current_user.is_authenticated %}
        <div class="mb-4">
            <a href="{{ url_for('add_item') }}" class="btn btn-success">ახალი ნივთის დამატება</a>
        </div>
    {% endif %}

    <form method="GET" action="{{ url_for('catalog') }}" class="form-row mb-5">
        <div class="col-md-6">
            <input type="text" name="find" class="form-control bg-dark text-white" placeholder="ძიება სისტემაში...">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary btn-block">სკანირება</button>
        </div>
    </form>

    <div class="row g-4">
        {% for h in hardware %}
            <!-- h-100 ათანაბრებს ბარათების სიმაღლეს -->
            <div class="col-12 col-md-6 col-lg-4 mb-4">
                <div class="card bg-dark text-white p-3 h-100">
                    <img src="{{ url_for('static', filename=h.img_link) }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title font-weight-bold">{{ h.title }}</h5>
                        <p class="card-text">{{ h.info }}</p>
                        
                        <!-- mt-auto ღილაკებს ბოლოში სწევს -->
                        <div class="mt-auto pt-3">
                            <span class="text-warning d-block mb-2">${{ h.cost }}</span>
                            <div class="d-flex flex-wrap gap-2">
                                <a href="{{ url_for('item_view', item_id=h.id) }}" class="btn btn-sm btn-outline-info">დეტალები</a>
                                <a href="{{ url_for('push_to_cart', el_id=h.id) }}" class="btn btn-sm btn-neon">🛒 კალათა</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
