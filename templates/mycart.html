{% extends 'base.html' %}
{% block content %}
<div class="neon-box p-4">
    <h2 class="mb-4 text-white">შესყიდვების სია</h2>
    {% if elements %}
        <ul class="list-group bg-transparent mb-4">
            {% for el in elements %}
            <li class="list-group-item bg-dark border-secondary d-flex justify-content-between align-items-center text-white">
                <div>{{ el.item.title }} - <span class="text-warning">${{ el.item.cost }}</span></div>
                <a href="{{ url_for('drop_from_cart', c_id=el.id) }}" class="text-danger font-weight-bold">წაშლა</a>
            </li>
            {% endfor %}
        </ul>
        <div class="p-3 border border-warning mb-4 d-flex justify-content-between text-white">
            <h4>სულ:</h4>
            <h4 class="text-warning">${{ total }}</h4>
        </div>
        <a href="{{ url_for('order_finish') }}" class="btn btn-neon btn-block py-3 font-weight-bold">შეკვეთის გაფორმება</a>
    {% else %}
        <p class="text-center text-muted py-4">სია ცარიელია.</p>
    {% endif %}
</div>
{% endblock %}
